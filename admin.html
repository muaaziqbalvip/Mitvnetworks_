<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITV SUPREME | GLOBAL COMMAND CENTER</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --gold: #ffcc33;
            --gold-glow: rgba(255, 204, 51, 0.4);
            --bg: #010101;
            --surface: #0a0a0a;
            --neon: #00f2ff;
            --error: #ff3131;
            --success: #39ff14;
            --font-head: 'Orbitron', sans-serif;
            --font-data: 'Share Tech Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body {
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                              url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- ADMIN LOCK SCREEN --- */
        #admin-lock-gate {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; justify-content: center; align-items: center;
        }
        .lock-box {
            width: 90%; max-width: 400px; background: var(--surface);
            padding: 40px; border-radius: 20px; border: 1px solid #1a1a1a;
            border-top: 4px solid var(--gold); text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        .lock-box i { font-size: 3rem; color: var(--gold); margin-bottom: 20px; }
        .lock-box h2 { font-family: var(--font-head); font-size: 1rem; margin-bottom: 25px; letter-spacing: 3px; }

        /* --- DASHBOARD UI --- */
        #main-admin-ui { display: none; padding: 20px; }

        header {
            background: rgba(10,10,10,0.9); border: 1px solid #1a1a1a;
            padding: 20px 5%; border-radius: 15px; display: flex;
            justify-content: space-between; align-items: center; margin-bottom: 30px;
            backdrop-filter: blur(10px); sticky; top: 10px; z-index: 1000;
        }
        .logo h1 { font-family: var(--font-head); color: var(--gold); font-size: 1.2rem; letter-spacing: 5px; }

        /* --- ANALYTICS CARDS --- */
        .stat-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--surface); padding: 25px; border-radius: 15px;
            border: 1px solid #151515; text-align: center; transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .stat-card h3 { font-family: var(--font-data); font-size: 2rem; color: var(--gold); }
        .stat-card p { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }

        /* --- CONTROL PANELS --- */
        .engine-room { display: grid; grid-template-columns: 400px 1fr; gap: 25px; }
        @media (max-width: 1100px) { .engine-room { grid-template-columns: 1fr; } }

        .side-panel { display: flex; flex-direction: column; gap: 20px; }
        .box { background: var(--surface); padding: 25px; border-radius: 18px; border: 1px solid #151515; }
        .box h4 { font-family: var(--font-head); font-size: 0.75rem; color: var(--gold); margin-bottom: 15px; }

        .input-group { background: #000; border: 1px solid #222; border-radius: 10px; padding: 12px; margin-bottom: 15px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.6rem; color: #444; margin-bottom: 5px; font-family: var(--font-data); }
        .input-group input { background: transparent; border: none; color: #fff; flex: 1; font-family: var(--font-data); width: 100%; }

        .btn-supreme {
            width: 100%; padding: 12px; background: var(--gold); border: none;
            border-radius: 10px; font-family: var(--font-head); font-weight: 900;
            cursor: pointer; font-size: 0.7rem; transition: 0.3s; color: #000;
        }
        .btn-supreme:hover { background: #fff; box-shadow: 0 0 20px var(--gold-glow); }

        /* --- M3U MANAGER LIST --- */
        #m3u-manager-list {
            margin-top: 15px; max-height: 400px; overflow-y: auto;
            background: #050505; border-radius: 10px; padding: 10px;
        }
        .m3u-card {
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px;
            padding: 15px; margin-bottom: 12px; transition: 0.3s;
        }
        .m3u-card:hover { border-color: var(--neon); }
        .m3u-info b { display: block; color: var(--gold); font-family: var(--font-data); font-size: 0.7rem; margin-bottom: 5px; }
        .m3u-info span { color: #555; font-size: 0.6rem; word-break: break-all; }
        
        .m3u-actions { display: flex; gap: 8px; margin-top: 12px; border-top: 1px solid #111; padding-top: 10px; }
        .m3u-btn { 
            flex: 1; padding: 8px; border-radius: 6px; border: none; font-family: var(--font-head); 
            font-size: 0.55rem; cursor: pointer; font-weight: bold;
        }
        .btn-edit { background: rgba(0, 242, 255, 0.1); color: var(--neon); border: 1px solid var(--neon); }
        .btn-del { background: rgba(255, 49, 49, 0.1); color: var(--error); border: 1px solid var(--error); }

        /* --- USER NODES --- */
        .user-stack { display: grid; gap: 15px; }
        .commander-node {
            background: #080808; border-radius: 15px; padding: 20px;
            border: 1px solid #151515; position: relative;
        }
        
        .intel-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; background: #000; padding: 15px; border-radius: 12px; margin-top: 15px;
        }
        .intel-box b { font-family: var(--font-data); color: #444; font-size: 0.6rem; display: block; }
        .intel-box span { font-family: var(--font-data); font-size: 0.7rem; color: #aaa; }

        .status-badge {
            position: absolute; top: 20px; right: 20px;
            padding: 5px 12px; border-radius: 50px; font-family: var(--font-data); font-size: 0.6rem;
        }
        .on { background: rgba(57, 255, 20, 0.1); color: var(--success); border: 1px solid var(--success); }
        .off { background: rgba(255, 49, 49, 0.1); color: var(--error); border: 1px solid var(--error); }
/* --- AD MANAGER CARD STYLING --- */
.admin-card {
    background: var(--surface);
    border: 1px solid rgba(255, 204, 51, 0.2);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 0.8s ease;
}

.admin-card h3 {
    font-family: 'Orbitron', sans-serif;
    color: var(--gold);
    font-size: 0.9rem;
    letter-spacing: 1px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #1a1a1a;
    padding-bottom: 10px;
}

/* Input Fields Styling */
.input-group input, 
.input-group textarea {
    width: 100%;
    background: #050505 !important;
    border: 1px solid #222 !important;
    border-radius: 8px;
    color: #fff;
    padding: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    margin-bottom: 10px;
    transition: 0.3s;
}

.input-group input:focus, 
.input-group textarea:focus {
    border-color: var(--gold) !important;
    box-shadow: 0 0 10px var(--gold-glow);
    outline: none;
}

/* Buttons Styling */
.action-btn {
    background: linear-gradient(45deg, #000, #1a1a1a);
    color: var(--gold);
    border: 2px solid var(--gold);
    padding: 12px;
    border-radius: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: 0.3s;
    text-transform: uppercase;
}

.action-btn:hover {
    background: var(--gold);
    color: #000;
    box-shadow: 0 0 20px var(--gold);
    transform: translateY(-2px);
}

/* Remove Ad Button (Special Red Style) */
.action-btn[onclick="clearAd()"] {
    background: rgba(255, 49, 49, 0.1);
    border-color: #ff3131;
    color: #ff3131;
}

.action-btn[onclick="clearAd()"]:hover {
    background: #ff3131;
    color: #fff;
    box-shadow: 0 0 20px rgba(255, 49, 49, 0.5);
}

/* Placeholder Color */
::placeholder {
    color: #444;
    font-size: 0.8rem;
}

/* Textarea height fix */
#ad-desc {
    height: 80px;
    resize: none;
}

    </style>
</head>
<body>

<div id="admin-lock-gate">
    <div class="lock-box animate__animated animate__fadeInDown">
        <i class="fas fa-user-shield"></i>
        <h2>🅰🅳🅼🅸🅽 🄿🄰🄽🄴🄻</h2>
        <div class="input-group">
            <input type="password" id="admin-master-key" placeholder="ENTER MASTER KEY">
        </div>
        <button class="btn-supreme" onclick="unlockAdminPanel()">UNLOCK COMMAND</button>
    </div>
</div>

<div id="main-admin-ui">
    <header>
        <div class="logo"><h1>🅼🅸🆃🆅 ADMIN</h1></div>
        <div style="font-family:var(--font-data); color:var(--neon);">[ STATUS: AUTHORIZED ]</div>
    </header>

    <div class="stat-grid">
        <div class="stat-card">
            <h3 id="stat-total">00</h3>
            <p>Total Commanders</p>
        </div>
        <div class="stat-card">
            <h3 id="stat-live" style="color:var(--success);">00</h3>
            <p>Active Signals</p>
        </div>
        <div class="stat-card">
            <h3 id="stat-revenue" style="color:var(--neon);">0</h3>
            <p>Revenue (PKR)</p>
        </div>
    </div>
<div class="box">
    <h4>SECURITY_CORE (REG_CODE)</h4>
    <div style="background:#000; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #1a1a1a; text-align:center;">
        <p style="font-size:0.55rem; color:#444; margin-bottom:5px; font-family:var(--font-data);">ACTIVE_AUTHORIZED_CODE</p>
        <h2 id="current-auth-display" style="font-family:var(--font-data); color:var(--gold); letter-spacing:3px; text-shadow: 0 0 10px var(--gold-glow);">----</h2>
    </div>
<div class="admin-card">
    <h3><i class="fas fa-ad"></i> GLOBAL ADVERTISEMENT MANAGER</h3>
    <div class="input-group">
        <input type="text" id="ad-title" placeholder="Add Title (e.g. MEGA OFFER)">
        <input type="text" id="ad-img" placeholder="Image URL (Direct Link)">
        <textarea id="ad-desc" placeholder="Short Description..." style="width:100%; background:#111; border:1px solid #333; color:#fff; padding:10px; border-radius:8px; margin-top:5px;"></textarea>
        <button class="action-btn" onclick="pushGlobalAd()" style="width:100%; margin-top:10px;">
            <i class="fas fa-broadcast-tower"></i> TRIGGER AD ON ALL DEVICES
        </button>
        <button class="action-btn" onclick="clearAd()" style="width:100%; background:#ff3131; border-color:#ff3131; margin-top:5px;">
            <i class="fas fa-trash"></i> REMOVE AD
        </button>
    </div>
</div>

    <div class="input-group">
        <input type="text" id="update-key-input" placeholder="ENTER NEW CODE">
    </div>
    <button class="btn-supreme" onclick="updateGlobalKey()" style="background:#111; color:var(--gold); border:1px solid var(--gold);">
        DEPLOY_NEW_KEY
    </button>
</div>

    <div class="engine-room">
        <div class="side-panel">
            <div class="box">
                <h4 id="m3u-form-title">DEPLOY NEW SOURCE</h4>
                <input type="hidden" id="edit-m3u-id">
                <div class="input-group">
                    <label>M3U URL SOURCE</label>
                    <input type="text" id="m3u-input" placeholder="https://example.com/live.m3u">
                </div>
                <button class="btn-supreme" id="m3u-action-btn" onclick="deployNewM3U()">PUSH TO NETWORK</button>
                <button class="btn-supreme" id="cancel-edit-btn" onclick="resetM3UForm()" style="display:none; background:#222; color:#fff; margin-top:10px;">CANCEL EDIT</button>

                <h4 style="margin-top:30px; font-size:0.6rem; color:#444; border-bottom:1px solid #111; padding-bottom:5px;">ACTIVE NETWORK SOURCES</h4>
                <div id="m3u-manager-list">
                    </div>
            </div>

            <div class="box">
                <h4>SECURITY OVERRIDE</h4>
                <div class="input-group">
                    <input type="text" id="update-key-input" placeholder="SET NEW MASTER KEY">
                </div>
                <button class="btn-supreme" onclick="updateGlobalKey()" style="background:#111; color:var(--gold); border:1px solid var(--gold);">UPDATE SYSTEM LOCK</button>
            </div>
        </div>

        <div class="user-nodes">
            <h4 style="font-family:var(--font-head); color:var(--gold); margin-bottom:15px;">LIVE NODE SURVEILLANCE</h4>
            <div class="user-stack" id="user-display-grid">
                </div>
        </div>
    </div>
</div>

<script>
    // FIREBASE INITIALIZE
    const firebaseConfig = {
        databaseURL: "https://mitv-baa8f-default-rtdb.firebaseio.com/",
        projectId: "mitv-baa8f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. UNLOCK PANEL
    async function unlockAdminPanel() {
        const inputKey = document.getElementById('admin-master-key').value;
        const snap = await db.ref('admin_settings/master_auth_code').once('value');
        const correctKey = snap.val() || "MUAAZ786";

        if(inputKey === correctKey) {
            document.getElementById('admin-lock-gate').style.display = 'none';
            document.getElementById('main-admin-ui').style.display = 'block';
            bootAdminCore();
        } else {
            alert("ACCESS_DENIED");
        }
    }

    function bootAdminCore() {
        loadUsers();
        loadM3UManager();
    }

    // 2. M3U MANAGER LOGIC (ADD, EDIT, DELETE)
    function deployNewM3U() {
        const url = document.getElementById('m3u-input').value;
        const editId = document.getElementById('edit-m3u-id').value;

        if(!url) return alert("Please enter URL");

        if(editId) {
            // EDIT MODE
            db.ref('m3u_sources/' + editId).set(url).then(() => {
                alert("SOURCE UPDATED");
                resetM3UForm();
            });
        } else {
            // ADD MODE
            db.ref('m3u_sources').push(url).then(() => {
                alert("NEW SOURCE DEPLOYED");
                document.getElementById('m3u-input').value = '';
            });
        }
    }

    function loadM3UManager() {
        db.ref('m3u_sources').on('value', snap => {
            const list = document.getElementById('m3u-manager-list');
            list.innerHTML = '';
            const data = snap.val();

            if(data) {
                Object.keys(data).forEach(id => {
                    const url = data[id];
                    list.innerHTML += `
                        <div class="m3u-card animate__animated animate__fadeIn">
                            <div class="m3u-info">
                                <b>NODE_ID: ${id.substring(0,10)}...</b>
                                <span>${url}</span>
                            </div>
                            <div class="m3u-actions">
                                <button class="m3u-btn btn-edit" onclick="prepareEditM3U('${id}', '${url}')">EDIT</button>
                                <button class="m3u-btn btn-del" onclick="deleteM3U('${id}')">DELETE</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                list.innerHTML = '<p style="color:#333; font-size:0.6rem; text-align:center;">No active sources.</p>';
            }
        });
    }

    function prepareEditM3U(id, url) {
        document.getElementById('m3u-form-title').innerText = "EDITING SOURCE";
        document.getElementById('m3u-input').value = url;
        document.getElementById('edit-m3u-id').value = id;
        document.getElementById('m3u-action-btn').innerText = "SAVE CHANGES";
        document.getElementById('cancel-edit-btn').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetM3UForm() {
        document.getElementById('m3u-form-title').innerText = "DEPLOY NEW SOURCE";
        document.getElementById('m3u-input').value = '';
        document.getElementById('edit-m3u-id').value = '';
        document.getElementById('m3u-action-btn').innerText = "PUSH TO NETWORK";
        document.getElementById('cancel-edit-btn').style.display = 'none';
    }

    function deleteM3U(id) {
        if(confirm("Are you sure you want to delete this source? It will stop working for all users.")) {
            db.ref('m3u_sources/' + id).remove().then(() => alert("SOURCE REMOVED"));
        }
    }

    // 3. USER SURVEILLANCE
    function loadUsers() {
        db.ref('mitv_users').on('value', uSnap => {
            const users = uSnap.val();
            const grid = document.getElementById('user-display-grid');
            grid.innerHTML = '';
            if(!users) return;

            const phoneKeys = Object.keys(users);
            document.getElementById('stat-total').innerText = phoneKeys.length;
            document.getElementById('stat-revenue').innerText = (phoneKeys.length * 100);

            db.ref('mitv_tracking').on('value', tSnap => {
                const tracking = tSnap.val() || {};
                let liveCount = 0;

                phoneKeys.forEach(phone => {
                    const u = users[phone];
                    const t = tracking[phone] || {};
                    const isOnline = t.status === "Online";
                    if(isOnline) liveCount++;

                    grid.innerHTML += `
                        <div class="commander-node">
                            <div class="status-badge ${isOnline ? 'on' : 'off'}">${isOnline ? 'LIVE' : 'LOST'}</div>
                            <h4 style="font-size:0.8rem; color:var(--gold);">${u.name.toUpperCase()}</h4>
                            <div class="intel-grid">
                                <div class="intel-box"><b>PHONE</b><span>${phone}</span></div>
                                <div class="intel-box"><b>DEVICE</b><span>${t.device || '---'}</span></div>
                                <div class="intel-box"><b>CITY</b><span>${t.city || '---'}</span></div>
                                <div class="intel-box"><b>ACTION</b><span>${t.current_action || 'IDLE'}</span></div>
                                <div class="intel-box"><b>EXPIRY</b><span>${new Date(u.expiry).toLocaleDateString()}</span></div>
                                <div class="intel-box"><b>IP</b><span>${t.ip || '---'}</span></div>
                            </div>
                            <div style="display:flex; gap:10px; margin-top:15px;">
                                <button onclick="rechargeUser('${phone}')" style="flex:1; background:#111; color:var(--gold); border:1px solid var(--gold); padding:8px; border-radius:5px; font-size:0.6rem; cursor:pointer;">RECHARGE</button>
                                <button onclick="purgeUser('${phone}')" style="flex:1; background:var(--error); color:#fff; border:none; padding:8px; border-radius:5px; font-size:0.6rem; cursor:pointer;">PURGE</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('stat-live').innerText = liveCount;
            });
        });
    }

    function rechargeUser(phone) {
        let d = new Date(); d.setDate(d.getDate() + 30);
        db.ref('mitv_users/' + phone).update({ expiry: d.toISOString(), status: 'Active' });
        alert("Recharged 30 Days!");
    }

    function purgeUser(phone) {
        if(confirm("Delete User?")) {
            db.ref('mitv_users/' + phone).remove();
            db.ref('mitv_tracking/' + phone).remove();
        }
    }

    function updateGlobalKey() {
        const k = document.getElementById('update-key-input').value;
        if(k) { db.ref('admin_settings/master_auth_code').set(k); alert("Key Updated"); }
    }
    // 1. Current Auth Code Load aur Display karne ka function
function syncAuthCodeStatus() {
    // Database ke usi node ko listen karna jo index.html use karti hai
    db.ref('admin_settings/master_auth_code').on('value', snap => {
        const currentKey = snap.val() || "MUAAZ786"; // Default agar DB khali ho
        
        // UI par code dikhana
        const displayElem = document.getElementById('current-auth-display');
        if(displayElem) {
            displayElem.innerText = currentKey;
        }
        
        // Input placeholder update karna
        document.getElementById('update-key-input').placeholder = "CURRENT: " + currentKey;
        console.log("System_Auth_Sync: " + currentKey);
    });
}

// 2. Isay bootAdminCore() ke andar shamil kar dein
function bootAdminCore() {
    loadUsers();
    loadM3UHistory();
    syncAuthCodeStatus(); // Ye line lazmi add karein
}
function pushGlobalAd() {
    const title = document.getElementById('ad-title').value;
    const img = document.getElementById('ad-img').value;
    const desc = document.getElementById('ad-desc').value;

    if(!title || !img) return alert("Title and Image are required!");

    db.ref('global_announcement').set({
        title: title,
        img: img,
        desc: desc,
        timestamp: Date.now(),
        active: true
    });
    alert("Ad Triggered Successfully!");
}

function clearAd() {
    db.ref('global_announcement').update({ active: false });
    alert("Ad Removed!");
}

</script>
</body>
</html>
