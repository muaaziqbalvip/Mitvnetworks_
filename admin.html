<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITV | SUPREME COMMAND CENTER</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        /* --- SUPREME ADMIN DESIGN SYSTEM --- */
        :root {
            --gold: #ffcc33;
            --gold-glow: rgba(255, 204, 51, 0.3);
            --bg: #020202;
            --card-bg: #0a0a0a;
            --red: #ff3131;
            --green: #39ff14;
            --neon: #00f2ff;
            --font-main: 'Rajdhani', sans-serif;
            --font-tech: 'Share Tech Mono', monospace;
            --font-head: 'Orbitron', sans-serif;
            --border: 1px solid #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        ::-webkit-scrollbar { width: 4px; background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: var(--font-main);
            padding: 15px;
            background-image: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.95)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            min-height: 100vh;
        }

        /* --- TOP COMMAND HUD --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px);
            border: var(--border); border-radius: 20px; margin-bottom: 25px;
            position: sticky; top: 10px; z-index: 1000; border-top: 3px solid var(--gold);
        }
        .logo-text { font-family: var(--font-head); font-weight: 900; color: var(--gold); letter-spacing: 4px; font-size: 1.4rem; }
        .live-indicator { display: flex; align-items: center; gap: 10px; font-family: var(--font-tech); color: var(--neon); }
        .pulse-dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(57, 255, 20, 0); } 100% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); } }

        /* --- GLOBAL STATS --- */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; margin-bottom: 25px;
        }
        .stat-box {
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            border: var(--border); text-align: center; transition: 0.3s;
        }
        .stat-box:hover { border-color: var(--gold); transform: translateY(-3px); }
        .stat-label { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }
        .stat-val { font-family: var(--font-tech); font-size: 1.8rem; color: #fff; margin-top: 5px; }

        /* --- CONTROL PANELS --- */
        .admin-layout { display: grid; grid-template-columns: 1fr 2.5fr; gap: 25px; }
        @media (max-width: 1100px) { .admin-layout { grid-template-columns: 1fr; } }

        .panel { background: var(--card-bg); border-radius: 20px; padding: 25px; border: var(--border); height: fit-content; }
        h3 { font-family: var(--font-head); font-size: 0.9rem; color: var(--gold); margin-bottom: 20px; border-left: 4px solid var(--gold); padding-left: 15px; }

        .input-wrap { background: #000; border: 1px solid #222; border-radius: 10px; padding: 10px; display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; background: transparent; border: none; color: #fff; font-family: var(--font-tech); }
        .btn-prime { background: var(--gold); border: none; padding: 8px 20px; border-radius: 8px; font-weight: 900; cursor: pointer; font-family: var(--font-head); font-size: 0.7rem; }

        /* --- DEEP TRACKING USER CARDS --- */
        .user-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .commander-node {
            background: #080808; border-radius: 20px; border: var(--border);
            padding: 20px; position: relative; transition: 0.4s; overflow: hidden;
        }
        .commander-node:hover { border-color: var(--neon); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .node-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .node-pfp { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); padding: 2px; }
        .node-info h4 { font-family: var(--font-head); font-size: 0.85rem; color: #fff; }
        .node-info p { font-family: var(--font-tech); font-size: 0.7rem; color: var(--gold); }

        /* Intelligence Table */
        .intel-table {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px;
            font-family: var(--font-tech); font-size: 0.75rem; border: 1px solid #111;
        }
        .intel-item { color: #666; }
        .intel-item b { color: #aaa; }
        .watching-status {
            grid-column: span 2; padding: 10px; background: rgba(0,242,255,0.05);
            border-radius: 8px; color: var(--neon); font-weight: bold; border-left: 3px solid var(--neon);
        }

        /* Action Buttons */
        .node-actions { display: flex; gap: 10px; margin-top: 15px; }
        .act-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-family: var(--font-head); font-size: 0.6rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-plus { background: #111; color: var(--gold); border: 1px solid var(--gold); }
        .btn-block { background: var(--red); color: #fff; }
        .btn-unblock { background: var(--green); color: #000; }
        .btn-purge { background: #222; color: #888; }

        .status-tag { position: absolute; top: 20px; right: 20px; font-size: 0.6rem; padding: 4px 10px; border-radius: 50px; font-family: var(--font-head); }
        .tag-online { background: rgba(57, 255, 20, 0.1); color: var(--green); border: 1px solid var(--green); }
        .tag-offline { background: rgba(255, 49, 49, 0.1); color: var(--red); border: 1px solid var(--red); }
    </style>
</head>
<body>

<header>
    <div class="logo-text">MITV ADMIN</div>
    <div class="live-indicator">
        <div class="pulse-dot"></div>
        <span id="active-count">ONLINE: 00</span>
    </div>
</header>

<div class="stats-grid">
    <div class="stat-box">
        <div class="stat-label">Total Commanders</div>
        <div class="stat-val" id="stat-users">0</div>
    </div>
    <div class="stat-box">
        <div class="stat-label">Master Key</div>
        <div class="stat-val" id="stat-auth" style="color: var(--gold);">----</div>
    </div>
    <div class="stat-box">
        <div class="stat-label">Revenue (PKR)</div>
        <div class="stat-val" id="stat-revenue" style="color: var(--green);">0</div>
    </div>
</div>

<div class="admin-layout">
    
    <div class="panel-stack" style="display: flex; flex-direction: column; gap: 20px;">
        <div class="panel">
            <h3>MASTER AUTH CODE</h3>
            <div class="input-wrap">
                <input type="text" id="new-auth-code" placeholder="ENTER NEW CODE">
                <button class="btn-prime" onclick="updateAuth()">SET</button>
            </div>
        </div>

        <div class="panel">
            <h3>PLAYLIST DEPLOYER</h3>
            <div class="input-wrap">
                <input type="text" id="m3u-url" placeholder="PASTE M3U LINK">
                <button class="btn-prime" onclick="addM3U()">DEPLOY</button>
            </div>
            <div id="m3u-display-list" style="max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="panel">
        <h3>GLOBAL NODE INTELLIGENCE</h3>
        <div class="user-grid" id="commander-list-engine">
            </div>
    </div>

</div>

<script>
    // --- FIREBASE SYNC ---
    const firebaseConfig = {
        databaseURL: "https://mitv-baa8f-default-rtdb.firebaseio.com/",
        projectId: "mitv-baa8f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. SYSTEM SETTINGS
    function updateAuth() {
        const val = document.getElementById('new-auth-code').value;
        if(val) db.ref('admin_settings/master_auth_code').set(val).then(() => alert("Master Key Updated!"));
    }

    db.ref('admin_settings/master_auth_code').on('value', snap => {
        document.getElementById('stat-auth').innerText = snap.val() || "MUAAZ786";
    });

    function addM3U() {
        const url = document.getElementById('m3u-url').value;
        if(url) {
            db.ref('m3u_sources').push(url);
            document.getElementById('m3u-url').value = '';
        }
    }

    db.ref('m3u_sources').on('value', snap => {
        const list = document.getElementById('m3u-display-list');
        list.innerHTML = '';
        const data = snap.val();
        if(data) {
            Object.keys(data).forEach(k => {
                list.innerHTML += `<div style="font-size:0.6rem; padding:8px; background:#000; margin-bottom:5px; border-radius:5px; display:flex; justify-content:space-between;">
                    ${data[k].substring(0,30)}... <i class="fas fa-trash" style="color:red;cursor:pointer" onclick="db.ref('m3u_sources/${k}').remove()"></i>
                </div>`;
            });
        }
    });

    // 2. DEEP USER TRACKING ENGINE
    db.ref('mitv_users').on('value', uSnap => {
        const users = uSnap.val();
        const engine = document.getElementById('commander-list-engine');
        engine.innerHTML = '';

        if(users) {
            const uList = Object.keys(users);
            document.getElementById('stat-users').innerText = uList.length;
            document.getElementById('stat-revenue').innerText = (uList.length * 100).toLocaleString();

            db.ref('mitv_tracking').on('value', tSnap => {
                const tracking = tSnap.val() || {};
                let liveCount = 0;

                uList.forEach(phone => {
                    const u = users[phone];
                    const t = tracking[phone] || {};
                    const isOnline = t.status === "Online";
                    if(isOnline) liveCount++;

                    const exp = new Date(u.expiry);
                    const isExpired = new Date() > exp;

                    engine.innerHTML += `
                        <div class="commander-node animate__animated animate__fadeIn">
                            <div class="status-tag ${isOnline ? 'tag-online' : 'tag-offline'}">
                                ${isOnline ? 'LIVE SESSION' : 'LAST SEEN: ' + (t.last_seen || '---')}
                            </div>

                            <div class="node-header">
                                <img src="${u.photo || 'https://via.placeholder.com/60'}" class="node-pfp">
                                <div class="node-info">
                                    <h4>${u.name.toUpperCase()}</h4>
                                    <p><i class="fas fa-phone"></i> ${phone} | <i class="fas fa-lock"></i> ${u.password}</p>
                                </div>
                            </div>

                            <div class="intel-table">
                                <div class="intel-item">IP: <b>${t.ip || '0.0.0.0'}</b></div>
                                <div class="intel-item">CITY: <b>${t.city || 'SCANNED'}</b></div>
                                <div class="intel-item">DEVICE: <b>${t.device || 'UNKNOWN'}</b></div>
                                <div class="intel-item">BATT: <b>${t.battery || '100%'}</b></div>
                                <div class="intel-item">OS: <b>${t.os || 'UNKNOWN'}</b></div>
                                <div class="intel-item" style="color:${isExpired ? 'red' : 'var(--green)'}">EXPIRY: <b>${exp.toLocaleDateString()}</b></div>
                                
                                <div class="watching-status">
                                    <i class="fas fa-satellite-dish"></i> CURRENTLY: ${t.current_action || 'IDLE'}
                                </div>
                            </div>

                            <div class="node-actions">
                                <button class="act-btn btn-plus" onclick="extendNode('${phone}')">+30 DAYS</button>
                                ${u.status === 'Active' ? 
                                    `<button class="act-btn btn-block" onclick="updateStatus('${phone}', 'Disabled')">BLOCK</button>` :
                                    `<button class="act-btn btn-unblock" onclick="updateStatus('${phone}', 'Active')">UNBLOCK</button>`
                                }
                                <button class="act-btn btn-purge" onclick="purgeNode('${phone}')">PURGE</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('active-count').innerText = "ONLINE: " + liveCount.toString().padStart(2, '0');
            });
        }
    });

    // CONTROLLER FUNCTIONS
    function extendNode(phone) {
        db.ref('mitv_users/' + phone + '/expiry').once('value', snap => {
            let current = new Date(snap.val());
            current.setDate(current.getDate() + 30);
            db.ref('mitv_users/' + phone).update({ expiry: current.toISOString(), status: 'Active' });
            alert("Extension Successful for " + phone);
        });
    }

    function updateStatus(phone, status) {
        db.ref('mitv_users/' + phone).update({ status: status });
    }

    function purgeNode(phone) {
        if(confirm("DANGER: Delete this commander permanently?")) {
            db.ref('mitv_users/' + phone).remove();
            db.ref('mitv_tracking/' + phone).remove();
        }
    }

</script>
</body>
</html>
