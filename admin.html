<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITV | SUPREME COMMAND CENTER</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --gold: #ffcc33;
            --bg: #050505;
            --card-bg: #0c0c0c;
            --red: #ff3131;
            --green: #39ff14;
            --neon: #00f2ff;
            --font-main: 'Rajdhani', sans-serif;
            --font-tech: 'Share Tech Mono', monospace;
            --font-head: 'Orbitron', sans-serif;
            --shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        ::-webkit-scrollbar { width: 6px; background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: var(--font-main);
            padding: 25px;
            background-image: radial-gradient(circle at top right, #0a0a0a, #050505);
        }

        /* --- HEADER HUD --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-text { font-family: var(--font-head); font-weight: 900; color: var(--gold); letter-spacing: 5px; font-size: 1.4rem; }
        .system-status { font-family: var(--font-tech); color: var(--green); font-size: 0.8rem; text-transform: uppercase; }

        /* --- ANALYTICS BAR --- */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--gold);
            box-shadow: var(--shadow);
        }
        .stat-label { font-size: 0.7rem; color: #666; font-family: var(--font-head); margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; font-family: var(--font-tech); color: #fff; }

        /* --- MAIN GRID LAYOUT --- */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid #1a1a1a;
            box-shadow: var(--shadow);
            height: fit-content;
        }

        h3 {
            font-family: var(--font-head);
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        /* --- PLAYLIST MANAGER --- */
        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #000;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #222;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: var(--font-tech);
            padding: 10px;
        }
        .btn-action {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            font-family: var(--font-head);
            font-size: 0.7rem;
            transition: 0.3s;
        }
        .btn-action:hover { transform: scale(1.05); filter: brightness(1.2); }

        .playlist-scroller { max-height: 400px; overflow-y: auto; }
        .m3u-card {
            background: #080808;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #151515;
        }
        .m3u-card span { font-family: var(--font-tech); font-size: 0.75rem; color: #888; overflow: hidden; text-overflow: ellipsis; }

        /* --- ADVANCED USER TRACKER --- */
        .user-scroller { max-height: 700px; overflow-y: auto; padding-right: 5px; }
        .user-node {
            background: #080808;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #151515;
            position: relative;
            transition: 0.3s;
        }
        .user-node:hover { border-color: var(--gold); }
        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .user-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); }
        .user-meta-name { font-weight: 700; color: #fff; font-size: 1rem; }
        .user-meta-email { font-family: var(--font-tech); color: #555; font-size: 0.7rem; }

        .user-data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #000;
            padding: 15px;
            border-radius: 12px;
            font-family: var(--font-tech);
            font-size: 0.75rem;
        }
        .data-item { color: #666; }
        .data-item b { color: var(--neon); }
        .watching-now { grid-column: span 2; padding-top: 5px; border-top: 1px solid #111; color: var(--gold); font-weight: bold; }

        .status-pill {
            position: absolute; top: 20px; right: 20px;
            padding: 4px 12px; border-radius: 5px; font-size: 0.6rem; font-weight: 900; font-family: var(--font-head);
        }
        .pill-online { background: rgba(57, 255, 20, 0.1); color: var(--green); border: 1px solid var(--green); }
        .pill-offline { background: rgba(255, 49, 49, 0.1); color: var(--red); border: 1px solid var(--red); }

        .control-panel {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-ctrl {
            flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; font-family: var(--font-head); font-size: 0.65rem; cursor: pointer; transition: 0.3s;
        }
        .btn-ban { background: var(--red); color: white; }
        .btn-unban { background: var(--green); color: black; }
        .btn-purge { background: #222; color: #fff; }

        @media (max-width: 1000px) { .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-text">MITV_COMMAND</div>
        <div class="system-status"><i class="fas fa-satellite fa-spin"></i> NETWORK_LIVE</div>
    </div>
    <div id="live-count-hud" style="font-family: var(--font-tech); color: var(--gold);">ACTIVE_NODES: 00</div>
</header>

<div class="analytics-grid">
    <div class="stat-box">
        <div class="stat-label">TOTAL SESSIONS</div>
        <div id="total-sessions" class="stat-value">0</div>
    </div>
    <div class="stat-box">
        <div class="stat-label">PLAYLIST SOURCES</div>
        <div id="total-m3u" class="stat-value">0</div>
    </div>
    <div class="stat-box" style="border-left-color: var(--neon);">
        <div class="stat-label">SECURITY SHIELDS</div>
        <div class="stat-value">ACTIVE</div>
    </div>
</div>

<div class="grid-layout">
    
    <div class="section-card">
        <h3><i class="fas fa-folder-plus"></i> SATELLITE SOURCES (M3U)</h3>
        <div class="input-box">
            <input type="text" id="m3u-url-input" placeholder="SOURCE URL (HTTPS://...)">
            <button class="btn-action" onclick="pushM3U()">DEPLOY</button>
        </div>
        <div class="playlist-scroller" id="m3u-list-display">
            </div>
    </div>

    <div class="section-card">
        <h3><i class="fas fa-fingerprint"></i> REAL-TIME USER INTELLIGENCE</h3>
        <div class="user-scroller" id="user-tracking-display">
            </div>
    </div>

</div>

<script>
    // 1. SYSTEM CONFIGURATION [Sync with Website]
    const firebaseConfig = {
        apiKey: "AIzaSyAXzI1yV8oIxnfinfoPD-xyHRVo-jMHFTg",
        authDomain: "mitv-baa8f.firebaseapp.com",
        databaseURL: "https://mitv-baa8f-default-rtdb.firebaseio.com/",
        projectId: "mitv-baa8f",
        storageBucket: "mitv-baa8f.firebasestorage.app",
        messagingSenderId: "618910336500",
        appId: "1:618910336500:web:6e4a3583c17d78ae96e5a1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. PLAYLIST ENGINE
    function pushM3U() {
        const url = document.getElementById('m3u-url-input').value;
        if(url.includes('http')) {
            db.ref('m3u_sources').push(url);
            document.getElementById('m3u-url-input').value = '';
        } else {
            alert("INVALID_PROTOCOL: Use HTTP/HTTPS URL");
        }
    }

    db.ref('m3u_sources').on('value', snap => {
        const display = document.getElementById('m3u-list-display');
        const count = document.getElementById('total-m3u');
        display.innerHTML = '';
        const data = snap.val();
        if(data) {
            count.innerText = Object.keys(data).length;
            Object.keys(data).forEach(key => {
                display.innerHTML += `
                    <div class="m3u-card">
                        <span>${data[key]}</span>
                        <i class="fas fa-trash-alt" style="color:var(--red); cursor:pointer;" onclick="db.ref('m3u_sources/${key}').remove()"></i>
                    </div>
                `;
            });
        }
    });

    // 3. SUPREME TRACKING & CONTROL ENGINE
    db.ref('mitv_tracking').on('value', snap => {
        const display = document.getElementById('user-tracking-display');
        const hudCount = document.getElementById('live-count-hud');
        const sessionCount = document.getElementById('total-sessions');
        display.innerHTML = '';
        
        const users = snap.val();
        if(users) {
            const uKeys = Object.keys(users);
            sessionCount.innerText = uKeys.length;
            hudCount.innerText = `ACTIVE_NODES: ${uKeys.length.toString().padStart(2, '0')}`;

            uKeys.forEach(uid => {
                const u = users[uid];
                const isOnline = u.login_status === "Online";
                const isBanned = u.status === "Disabled";

                display.innerHTML += `
                    <div class="user-node" style="${isBanned ? 'border-color:var(--red);' : ''}">
                        <div class="status-pill ${isOnline ? 'pill-online' : 'pill-offline'}">
                            ${isOnline ? 'LIVE' : 'OFFLINE'}
                        </div>
                        
                        <div class="user-header">
                            <img src="${u.photo || 'https://via.placeholder.com/50'}" class="user-img">
                            <div>
                                <div class="user-meta-name">${u.name || 'ANONYMOUS'}</div>
                                <div class="user-meta-email">${u.email || 'N/A'}</div>
                            </div>
                        </div>

                        <div class="user-data-grid">
                            <div class="data-item">IP: <b>${u.ip || '0.0.0.0'}</b></div>
                            <div class="data-item">BATTERY: <b>${u.battery || 'N/A'}</b></div>
                            <div class="data-item">OS: <b>${u.device_os || 'N/A'}</b></div>
                            <div class="data-item">LAST_PING: <b>${u.last_ping || 'N/A'}</b></div>
                            <div class="watching-now">
                                <i class="fas fa-play-circle"></i> ACTIVITY: ${u.watching || 'IDLE'}
                            </div>
                        </div>

                        <div class="control-panel">
                            ${isBanned ? 
                                `<button class="btn-ctrl btn-unban" onclick="setAccess('${uid}', 'Enabled')">AUTHORIZE ACCESS</button>` : 
                                `<button class="btn-ctrl btn-ban" onclick="setAccess('${uid}', 'Disabled')">TERMINATE ACCESS</button>`
                            }
                            <button class="btn-ctrl btn-purge" onclick="db.ref('mitv_tracking/${uid}').remove()">PURGE_DATA</button>
                        </div>
                    </div>
                `;
            });
        } else {
            display.innerHTML = '<p style="text-align:center; color:#444; margin-top:50px;">NO_ACTIVE_SESSIONS_FOUND</p>';
        }
    });

    // 4. ACCESS CONTROL FUNCTION
    function setAccess(uid, status) {
        if(confirm(`Are you sure to ${status === 'Disabled' ? 'BLOCK' : 'ENABLE'} this user?`)) {
            db.ref('mitv_tracking/' + uid).update({ status: status });
        }
    }
</script>

</body>
</html>
