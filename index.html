<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITV | FINAL FIX</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:100px; font-family:sans-serif;">

    <div id="login-screen">
        <h1 style="color:#ffcc33;">MITV LOGIN</h1>
        <p>Vercel par test karein, storage se nahi.</p>
        <button id="google-login-btn" style="padding:15px 30px; font-weight:bold; cursor:pointer;">SIGN IN WITH GOOGLE</button>
    </div>

    <div id="main-app" style="display:none;">
        <h2 id="user-name">Welcome</h2>
        <button onclick="firebase.auth().signOut()">Logout</button>
    </div>

<script>
    // 1. AAPKI CONFIG (Verified from your screenshot 1000057397.jpg)
    const firebaseConfig = {
        apiKey: "AIzaSyAXzI1yV8oIxnfinfoPD-xyHRVo-jMHFTg",
        authDomain: "mitv-baa8f.firebaseapp.com",
        databaseURL: "https://mitv-baa8f-default-rtdb.firebaseio.com/",
        projectId: "mitv-baa8f",
        storageBucket: "mitv-baa8f.firebasestorage.app",
        messagingSenderId: "618910336500",
        appId: "1:618910336500:web:6e4a3583c17d78ae96e5a1"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 2. LOGIN LOGIC (Mobile ke liye Redirect best hai)
    document.getElementById('google-login-btn').addEventListener('click', () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        // Redirect method use karein taake popup block na ho
        auth.signInWithRedirect(provider);
    });

    // Login hone ke baad ka result check karein
    auth.getRedirectResult().then((result) => {
        if (result.user) {
            console.log("Logged in as:", result.user.displayName);
        }
    }).catch((error) => {
        if (error.code !== 'auth/no-auth-event') {
            alert("Error: " + error.message);
        }
    });

    // UI Update on Auth Change
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-name').innerText = "Hello, " + user.displayName;
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });
</script>
</body>
</html>
